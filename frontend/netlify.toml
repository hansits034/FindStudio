# Netlify config untuk FindStudio (Next.js static export)
# Deploy: hubungkan repo ke Netlify, set base directory = findstudio/frontend
# atau drag-and-drop folder `out/` ke app.netlify.com/drop

[build]
  command = "npm run build"
  publish = "out"

[build.environment]
  NODE_VERSION = "20"

# SPA-style fallback untuk route dinamis (equipment/studio) jika diakses langsung
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
